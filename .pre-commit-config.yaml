default_language_version:
  python: python3.11

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-merge-conflict
  - id: check-added-large-files

- repo: https://github.com/doublify/toolchain
  rev: v0.1.0
  hooks:
  - id: rustfmt

- repo: https://github.com/rust-lang/rust-clippy
  rev: v0.1.81
  hooks:
  - id: clippy

- repo: https://github.com/JohnnyMorganz/StyLua
  rev: v0.21.0
  hooks:
  - id: stylua

- repo: local
  hooks:
  - id: luacheck
    name: luacheck
    entry: luacheck
    language: system
    types: [lua]
    args: [--config, .luacheckrc]
