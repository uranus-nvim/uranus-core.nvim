default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/doublify/toolchain
    rev: v0.1.0
    hooks:
      - id: rustfmt

  - repo: https://github.com/rust-lang/rust-clippy
    rev: v0.1.81
    hooks:
      - id: clippy

  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v0.21.0
    hooks:
      - id: stylua
        args: [--check]

- repo: https://github.com/JohnnyMorganz/luacheck-action
  rev: v2
  hooks:
  - id: luacheck
    args: --config .luacheckrc