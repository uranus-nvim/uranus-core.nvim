name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: liburanus.so
          - os: macos-latest
            artifact_name: liburanus.dylib
          - os: windows-latest
            artifact_name: uranus.dll

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Copy binary to artifact
        run: |
          mkdir -p artifact
          cp target/release/${{ matrix.artifact_name }} artifact/${{ matrix.artifact_name }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.artifact_name }}
          path: artifact/${{ matrix.artifact_name }}

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download ubuntu artifact
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-latest-liburanus.so
          path: artifacts/ubuntu

      - name: Download macos artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-latest-liburanus.dylib
          path: artifacts/macos

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-latest-uranus.dll
          path: artifacts/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ubuntu/*
            artifacts/macos/*
            artifacts/windows/*
          draft: true
          generate_release_notes: true
