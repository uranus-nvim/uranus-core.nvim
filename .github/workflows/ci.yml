name: CI

on:
  push:
    branches: [main, master, develop, test/ci-trigger]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, nightly]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy

    - name: Cache cargo registry
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      if: matrix.rust == 'stable'
      run: cargo fmt --check

    - name: Check clippy
      run: cargo clippy -- -D warnings --allow dead_code

    # Build and test only on Linux where we have LuaJIT available
    # On macOS/Windows, nvim-oxi requires LuaJIT symbols which aren't available in CI
    - name: Build (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: cargo build --release

    - name: Run tests (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: cargo test

  lua:
    name: Lua
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Neovim
      run: |
        sudo apt-get update
        sudo apt-get install -y neovim

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install pre-commit
      run: pip install pre-commit

    - name: Run pre-commit (stylua and luacheck)
      run: pre-commit run --all-files stylua luacheck

    - name: Run Lua tests
      run: |
        nvim --headless -u tests/minimal_init.lua -c "lua dofile('tests/test_runner.lua')" -c "qa!"
